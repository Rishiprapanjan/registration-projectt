<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="rg.css">
</head>
<body>

<header>
    <h1>Hindusthan College</h1>
</header>

<div class="container">
    <h2>Student Registration</h2>

    <form>
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label for="phone">Mobile Number</label>
            <input type="tel" id="phone" placeholder="Enter mobile number">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="gender">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>
        </div>

        <div class="form-group">
            <label for="department">Department</label>
            <select id="department">
                <option>Select Department</option>
                <option>AI & DS</option>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>Mechanical</option>
            </select>
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <select id="city">
                <option>Select City</option>
                <option>Coimbatore</option>
                <option>Chennai</option>
                <option>Bangalore</option>
                <option>Hyderabad</option>
            </select>
        </div>

        <div class="form-group">
            <label for="remarks">Remarks</label>
            <textarea id="remarks" rows="4" placeholder="Enter your remarks"></textarea>
        </div>

        <div class="buttons">
            <button type="submit" class="register">Register</button>
            <button type="reset" class="reset">Reset</button>
        </div>
    </form>
</div>

<footer>
    <p>© 2026 Hindusthan College. All Rights Reserved.</p>
</footer>

</body>
</html>
